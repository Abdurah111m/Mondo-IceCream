<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mondo IceCream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Geologica', sans-serif; -webkit-tap-highlight-color: transparent; }
        .brand-gradient {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        }
        /* Mahsulot kartochkasi bosilgandagi effekt */
        .product-card { transition: all 0.2s ease; }
        .product-card:active { transform: scale(0.96); }
        
        /* Animatsiya: Savatga narsa qo'shilganda silkinish */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .cart-pop { animation: pop 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans select-none overflow-x-hidden">

    <header class="brand-gradient p-8 rounded-b-[40px] shadow-lg mb-6 relative">
        <div class="flex flex-col items-center text-white text-center">
            <h1 class="text-4xl font-extrabold tracking-tight drop-shadow-md">MONDO</h1>
            <p class="text-sm opacity-90 font-medium tracking-widest mt-1 uppercase">Premium Gelato</p>
        </div>
    </header>

    <div class="px-5">
        <div class="flex items-center justify-between mb-8 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex flex-col">
                <span class="text-gray-400 text-xs uppercase tracking-tighter">Xush kelibsiz</span>
                <span id="user-name" class="font-bold text-gray-800 text-lg">Mijoz</span>
            </div>
            <div class="bg-pink-50 p-2 rounded-xl">
                <span class="text-2xl">🍦</span>
            </div>
        </div>

        <h2 class="text-xl font-bold text-gray-800 mb-5 flex items-center gap-2">
            Muzqaymoqlar <span class="text-pink-400">✨</span>
        </h2>

        <div class="grid grid-cols-2 gap-4 pb-24">
            
            <div class="product-card bg-white p-4 rounded-[30px] shadow-sm border border-gray-50 flex flex-col">
                <div class="w-full h-36 bg-pink-50 rounded-2xl mb-4 flex items-center justify-center relative overflow-hidden">
                    <span class="text-5xl drop-shadow-sm z-10">🍦</span>
                    <div class="absolute -bottom-2 -right-2 w-16 h-16 bg-pink-100 rounded-full blur-2xl"></div>
                </div>
                <h3 class="font-bold text-gray-800 text-sm mb-1">Classic Cono</h3>
                <p class="text-pink-500 font-extrabold text-base">15,000 so'm</p>
                <button onclick="addToCart('Classic Cono', 15000, this)" 
                    class="w-full mt-4 bg-gray-900 text-white py-3 rounded-2xl text-[10px] font-black tracking-widest uppercase active:bg-pink-600 transition-all shadow-md active:shadow-none">
                    Savatga
                </button>
            </div>

            <div class="product-card bg-white p-4 rounded-[30px] shadow-sm border border-gray-100 flex flex-col">
                <div class="w-full h-36 bg-blue-50 rounded-2xl mb-4 flex items-center justify-center relative overflow-hidden">
                    <span class="text-5xl drop-shadow-sm z-10">🍫</span>
                    <div class="absolute -bottom-2 -right-2 w-16 h-16 bg-blue-100 rounded-full blur-2xl"></div>
                </div>
                <h3 class="font-bold text-gray-800 text-sm mb-1">Choco Mondo</h3>
                <p class="text-pink-500 font-extrabold text-base">18,000 so'm</p>
                <button onclick="addToCart('Choco Mondo', 18000, this)" 
                    class="w-full mt-4 bg-gray-900 text-white py-3 rounded-2xl text-[10px] font-black tracking-widest uppercase active:bg-pink-600 transition-all shadow-md active:shadow-none">
                    Savatga
                </button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Ismni chiqarish
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user?.first_name || "Aziz Mijoz";

        // Animatsiya bilan savatga qo'shish (Wrapper funksiya)
        function addToCart(name, price, btn) {
            // Tugmani animatsiya qilish
            btn.classList.add('cart-pop');
            setTimeout(() => btn.classList.remove('cart-pop'), 300);

            // Asosiy script.js dagi addToCart funksiyasini chaqirish
            // (Agar script.js dagi funksiya nomini o'zgartirmagan bo'lsangiz)
            if (typeof window.addToCart === "function") {
                window.addToCart(name, price);
            }
        }
    </script>
</body>
</html>
