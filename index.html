<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mondo IceCream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Geologica', sans-serif; }
        .brand-gradient {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        }
        .product-card:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans select-none">

    <header class="brand-gradient p-6 rounded-b-[30px] shadow-lg mb-6">
        <div class="flex flex-col items-center text-white">
            <h1 class="text-3xl font-extrabold tracking-tight">MONDO</h1>
            <p class="text-sm opacity-90 font-medium">Gelato & Ice Cream</p>
        </div>
    </header>

    <div class="p-4">
        <div class="flex items-center justify-between mb-6 bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
            <span class="text-gray-500 text-sm">Xush kelibsiz,</span>
            <span id="user-name" class="font-bold text-blue-600">Mehmon</span>
        </div>

        <div class="grid grid-cols-2 gap-4">
            
            <div class="product-card bg-white p-3 rounded-3xl shadow-md border border-gray-50 flex flex-col items-center transition-all">
                <div class="w-full h-32 bg-pink-100 rounded-2xl mb-3 flex items-center justify-center">
                    <span class="text-4xl">🍦</span>
                </div>
                <h3 class="font-bold text-gray-800 text-center text-sm">Classic Cono</h3>
                <p class="text-pink-500 font-extrabold mt-1">15,000 so'm</p>
                <button onclick="addToCart('Classic Cono', 15000)" class="w-full mt-3 bg-gray-900 text-white py-2.5 rounded-xl text-xs font-bold active:bg-pink-600 transition-colors">
                    SAVATGA
                </button>
            </div>

            <div class="product-card bg-white p-3 rounded-3xl shadow-md border border-gray-50 flex flex-col items-center transition-all">
                <div class="w-full h-32 bg-blue-100 rounded-2xl mb-3 flex items-center justify-center">
                    <span class="text-4xl">🍫</span>
                </div>
                <h3 class="font-bold text-gray-800 text-center text-sm">Choco Mondo</h3>
                <p class="text-pink-500 font-extrabold mt-1">18,000 so'm</p>
                <button onclick="addToCart('Choco Mondo', 18000)" class="w-full mt-3 bg-gray-900 text-white py-2.5 rounded-xl text-xs font-bold active:bg-pink-600 transition-colors">
                    SAVATGA
                </button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Ismni chiqarish uchun kichik skript
        document.getElementById('user-name').innerText = window.Telegram.WebApp.initDataUnsafe.user?.first_name || "Mijoz";
    </script>
</body>
</html>
